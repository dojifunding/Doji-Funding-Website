<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #08090b; }
body {
  background: #08090b;
  color: #E8E8E8;
  font-family: 'Chivo Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 40px 64px;
  position: relative;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}
.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1160px;
}
.hdr {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 44px;
  padding-bottom: 20px;
  border-bottom: 1px solid #1a1a1a;
}
.hdr-eyebrow {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: #10B981;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.hdr-title {
  font-family: 'Doto', monospace;
  font-size: 56px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #fff;
  line-height: 1;
}
.hdr-title .accent { color: #10B981; }
.hdr-meta {
  text-align: right;
  font-size: 9px;
  letter-spacing: 0.16em;
  color: #3a3a3a;
  text-transform: uppercase;
  line-height: 2;
}
.diagram { width: 100%; }
svg { width: 100%; height: auto; display: block; overflow: visible; }

/* ── Live dot on center node ── */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}
.live { animation: pulse 2.4s ease-in-out infinite; }

/* ── Center node pulse (same period as wheel = 1.9 s) ── */
@keyframes center-pulse {
  0%, 100% { opacity: 0.1; }
  50%      { opacity: 0.9; }
}
.center-pulse-anim {
  animation: center-pulse 1.9s ease-in-out infinite;
  pointer-events: none;
}

/* ── Satellite glow overlays ── */
.node-glow {
  opacity: 0;
  transition: opacity 0.65s ease;
  pointer-events: none;
}
/* ── Glow connection lines ── */
.conn-glow {
  stroke-opacity: 0;
  transition: stroke-opacity 0.65s ease;
  pointer-events: none;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid #1a1a1a;
  font-size: 8px;
  letter-spacing: 0.18em;
  color: #2e2e2e;
  text-transform: uppercase;
}
.fdots { display: flex; gap: 6px; align-items: center; }
.fdot  { width: 6px; height: 6px; border-radius: 50%; background: #1a1a1a; }
.fdot.on { background: #10B981; }
@media print {
  body { padding: 15mm; }
  @page { size: A4 landscape; margin: 0; }
}
</style>
</head>

<script>
(function () {
  // Clockwise: top-left → top-center → top-right → bot-right → bot-center → bot-left
  var order = [1, 2, 3, 6, 5, 4];
  var idx   = 0;
  var prev  = null;

  function tick() {
    var id   = order[idx];
    var node = document.getElementById('glow-node-' + id);
    var conn = document.getElementById('glow-conn-' + id);

    if (prev !== null) {
      var pNode = document.getElementById('glow-node-' + prev);
      var pConn = document.getElementById('glow-conn-' + prev);
      if (pNode) pNode.style.opacity = '0';
      if (pConn) pConn.style.strokeOpacity = '0';
    }

    if (node) node.style.opacity = '1';
    if (conn) conn.style.strokeOpacity = '0.75';

    prev = id;
    idx  = (idx + 1) % order.length;
  }

  tick();
  setInterval(tick, 1900);
})();
</script>
